<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Bawayi Dental System - Mohammed Ezzadin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { background-color: #d1e3f0; color: #333; font-family: sans-serif; margin: 0; padding: 0; }
        
        .btn-refresh { 
            position: fixed; top: 15px; right: 15px; 
            width: 45px; height: 45px; border-radius: 50%; 
            background: #ffcc00; color: #000; border: 2px solid #333;
            cursor: pointer; font-size: 20px; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        .no-print-zone { 
            text-align: center; padding: 20px; background: #1a2a3a; border-bottom: 3px solid #00aaff; 
            display: flex; justify-content: center; gap: 15px; align-items: center;
        }

        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        .btn-up { background: #ff4d4d; color: white; } 
        .btn-down { background: #28a745; color: white; } 

        .report-page {
            width: 210mm; min-height: 296mm; background-color: #fff;
            margin: 10px auto; padding: 10mm; box-sizing: border-box;
            display: flex; flex-direction: column; position: relative;
        }

        .header-info {
            display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px;
            padding-bottom: 10px; border-bottom: 2px solid #00aaff; align-items: center; margin-bottom: 10px;
        }

        .clinic-name-ar .main-title { color: #00aaff; font-size: 28px; font-weight: bold; display: block; text-align: center; }
        .clinic-name-ar .sub-title { color: #555; font-size: 14px; display: block; text-align: center; }
        .info-box { font-size: 14px; color: #333; font-weight: bold; }

        .image-grid {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px; 
        }

        .grid-item {
            height: 205px; /* قەبارەیەکی مامناوەند و گونجاو */
            border: 1px solid #ddd;
            overflow: hidden;
            background: #000; /* ئەگەر وێنەکە زۆر جیاواز بوو ڕەش دیار بێت جوانترە */
            position: relative;
            display: flex;
        }

        /* لێرە وێنەکە پڕ بە خانەکە دەبێت */
        img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* ئەمە وێنەکە پڕ بە خانەکە دەکات بێ تێکچوون */
        } 
        
        .index-tag {
            position: absolute; top: 5px; left: 5px; font-size: 11px; 
            color: #fff; background: rgba(0, 170, 255, 0.85); 
            padding: 2px 6px; border-radius: 3px;
            z-index: 5;
        }

        .footer-credit { 
            margin-top: auto;
            text-align: center; font-size: 10px; color: #aaa; 
            padding-top: 10px;
        }

        #file-input { display: none; }

        @media print {
            .no-print-zone, .btn-refresh { display: none; }
            body { background: none; }
            .report-page { margin: 0; box-shadow: none; }
        }
    </style>
</head>
<body>

<button title="Refresh" class="btn-refresh" onclick="window.location.reload();">🔄</button>

<div class="no-print-zone">
    <label for="file-input" class="btn btn-up">📁 بارکردنی تیشک PDF</label>
    <input type="file" id="file-input" accept="application/pdf">
    <button id="pdf-btn" class="btn btn-down" style="display:none;">📥 پاشەکەوتکردن وەک PDF</button>
</div>

<div id="report-container"></div>

<script>
    const fileInput = document.getElementById('file-input');
    const pdfBtn = document.getElementById('pdf-btn');
    const reportContainer = document.getElementById('report-container');
    
    const today = new Date().toISOString().split('T')[0];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const patientName = file.name.replace(/\.[^/.]+$/, "");
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        
        reportContainer.innerHTML = '';
        
        const createPage = () => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'report-page';
            pageDiv.innerHTML = `
                <div class="header-info">
                    <div class="info-box">Patient: <span style="color:#00aaff;">${patientName}</span></div>
                    <div class="clinic-name-ar">
                        <span class="main-title">عيادة باوايي</span>
                        <span class="sub-title">لاشعة الاسنان والوجه والفكين</span>
                    </div>
                    <div class="info-box" style="text-align:left;">Date: ${today}</div>
                </div>
                <div class="image-grid"></div>
                <div class="footer-credit">Developed by: Mohammed Ezzadin</div>
            `;
            reportContainer.appendChild(pageDiv);
            return pageDiv.querySelector('.image-grid');
        };

        let currentGrid = createPage();
        let imagesCount = 0;
        const maxImagesPerPage = 12;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.5 }); 
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;

            if (imagesCount >= maxImagesPerPage) {
                currentGrid = createPage();
                imagesCount = 0;
            }

            const item = document.createElement('div');
            item.className = 'grid-item';
            
            if (i > 3) {
                const tag = document.createElement('span');
                tag.className = 'index-tag';
                tag.innerText = i - 3;
                item.appendChild(tag);
            }

            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/jpeg', 0.95);
            item.appendChild(img);
            
            currentGrid.appendChild(item);
            imagesCount++;
        }
        pdfBtn.style.display = 'inline-block';
    });

    pdfBtn.onclick = () => {
        const element = document.getElementById('report-container');
        html2pdf().set({
            margin: 0,
            filename: 'Bawayi_Dental_Report.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2.5, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    };
</script>

</body>
</html>
