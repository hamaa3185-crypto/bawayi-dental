<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Bawayi Dental System - Mohammed Ezzadin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        .no-print-zone { 
            text-align: center; padding: 15px; background: #161b22; border-bottom: 2px solid #00aaff; 
        }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-up { background: #ffcc00; color: #000; }
        .btn-down { background: #ff0000; color: white; margin-right: 2mm; }

        .report-page {
            width: 210mm;
            min-height: 297mm;
            background-color: #000;
            margin: 10mm auto;
            padding: 5mm;
            box-sizing: border-box;
        }

        .header-info {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            align-items: center;
            margin-bottom: 10px;
        }

        .clinic-name-ar { text-align: center; }
        .clinic-name-ar .main-title { color: #00aaff; font-size: 22px; font-weight: bold; display: block; }
        .clinic-name-ar .sub-title { color: #ffffff; font-size: 12px; display: block; }

        .info-box { font-size: 11px; color: #aaa; }

        .top-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2px;
            margin-bottom: 5px;
        }
        .top-row div { 
            border: 0.5px solid #222; 
            height: 200px; 
            background: #000; 
            display: flex; align-items: center; justify-content: center; 
        }
        .top-row img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 1px;
        }
        .grid-item {
            aspect-ratio: 0.8;
            border: 0.5px solid #111;
            position: relative;
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .grid-item img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .index-tag {
            position: absolute; top: 1px; left: 1px;
            font-size: 7px; color: #ffcc00; background: rgba(0,0,0,0.6); padding: 1px 2px;
        }

        .footer-credit { text-align: center; font-size: 10px; color: #333; margin-top: 20px; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="no-print-zone">
    <label for="file-input" class="btn btn-up">📁 بارکردنی مەلەفی PDF</label>
    <input type="file" id="file-input" accept="application/pdf">
    <button id="pdf-btn" class="btn btn-down" style="display:none;">📥 دابەزاندنی PDF</button>
</div>

<div id="report" class="report-page">
    <div class="header-info">
        <div class="info-box">
            Patient Name: <span id="patient-name-label" style="color:#fff;">...</span><br>
            ID: <span id="scan-id">#CBCT-8K</span>
        </div>
        <div class="clinic-name-ar">
            <span class="main-title">عیادة باوايي</span>
            <span class="sub-title">لاشعة الاسنان والوجة الفكين</span>
        </div>
        <div class="info-box" style="text-align:left;">
            Date: 2026-05-12<br>
            System: 8K Precision
        </div>
    </div>

    <div class="top-row">
        <div id="img1"></div>
        <div id="img2"></div>
        <div id="img3"></div>
    </div>

    <div class="image-grid" id="grid"></div>

    <div class="footer-credit">Developed by: Mohammed Ezzadin</div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const grid = document.getElementById('grid');
    const pdfBtn = document.getElementById('pdf-btn');
    const patientNameLabel = document.getElementById('patient-name-label');
    let currentFileName = "Report";

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        currentFileName = file.name.replace(/\.[^/.]+$/, "");
        patientNameLabel.innerText = currentFileName;

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        
        grid.innerHTML = '';
        const topSlots = [document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];
        topSlots.forEach(s => s.innerHTML = '');

        if(pdf.numPages > 20) {
            grid.style.gridTemplateColumns = "repeat(auto-fill, minmax(50px, 1fr))";
        }

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2.5 }); 
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
            
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/jpeg', 0.9);

            if (i <= 3) {
                topSlots[i-1].appendChild(img);
            } else {
                const item = document.createElement('div');
                item.className = 'grid-item';
                const tag = document.createElement('span');
                tag.className = 'index-tag';
                tag.innerText = i - 3;
                item.appendChild(tag);
                item.appendChild(img);
                grid.appendChild(item);
            }
        }
        pdfBtn.style.display = 'inline-block';
    });

    pdfBtn.onclick = () => {
        const element = document.getElementById('report');
        html2pdf().set({
            margin: 0,
            filename: currentFileName + '_8K.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2, backgroundColor: '#000000' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    };
</script>

</body>
</html>
